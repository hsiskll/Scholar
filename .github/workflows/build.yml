name: Build CSEGuide APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Create Capacitor project
        run: |
          mkdir -p cseguide-app/www
          cp index.html cseguide-app/www/index.html
          [ -f icon-192.png ] && cp icon-192.png cseguide-app/www/ || true
          [ -f icon-512.png ] && cp icon-512.png cseguide-app/www/ || true
          [ -f manifest.json ] && cp manifest.json cseguide-app/www/ || true
          [ -f sw.js ] && cp sw.js cseguide-app/www/ || true

      - name: Install Capacitor
        working-directory: cseguide-app
        run: |
          npm init -y
          npm install @capacitor/core@latest @capacitor/cli@latest @capacitor/android@latest

      - name: Write Capacitor config
        working-directory: cseguide-app
        run: |
          cat > capacitor.config.json << 'EOF'
          {
            "appId": "com.hsiskll.cseguide",
            "appName": "CSEGuide",
            "webDir": "www",
            "android": {
              "allowMixedContent": true
            },
            "server": {
              "androidScheme": "https"
            }
          }
          EOF

      - name: Add Android platform
        working-directory: cseguide-app
        run: npx cap add android

      - name: Sync Capacitor
        working-directory: cseguide-app
        run: npx cap sync android

      - name: Fix Kotlin duplicate classes
        working-directory: cseguide-app
        run: |
          # Inject Kotlin version resolution into the root build.gradle
          cat >> android/build.gradle << 'EOF'

          // Fix duplicate Kotlin stdlib classes
          subprojects {
              configurations.all {
                  resolutionStrategy {
                      force "org.jetbrains.kotlin:kotlin-stdlib:1.9.0"
                      force "org.jetbrains.kotlin:kotlin-stdlib-jdk7:1.9.0"
                      force "org.jetbrains.kotlin:kotlin-stdlib-jdk8:1.9.0"
                  }
              }
          }
          EOF

      - name: Make gradlew executable
        working-directory: cseguide-app
        run: chmod +x android/gradlew

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('cseguide-app/android/**/*.gradle*', 'cseguide-app/android/**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build Debug APK
        working-directory: cseguide-app/android
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: CSEGuide-APK
          path: cseguide-app/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Done
        run: |
          echo "✅ APK ready!"
          ls -lh cseguide-app/android/app/build/outputs/apk/debug/
