name: Build CSEGuide APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      # 1. Get the repo files
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Node.js (needed for Capacitor + npm)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # 3. Java (needed for Gradle / Android build)
      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 4. Android SDK
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # 5. Create a minimal Capacitor project around the HTML file
      - name: Create Capacitor project
        run: |
          mkdir -p cseguide-app/www
          # Copy the app HTML as the entry point
          cp index.html cseguide-app/www/index.html
          # Copy icons if they exist
          [ -f icon-192.png ] && cp icon-192.png cseguide-app/www/ || true
          [ -f icon-512.png ] && cp icon-512.png cseguide-app/www/ || true
          [ -f manifest.json ] && cp manifest.json cseguide-app/www/ || true
          [ -f sw.js ] && cp sw.js cseguide-app/www/ || true

      # 6. Initialise npm and install Capacitor inside the project folder
      - name: Install Capacitor
        working-directory: cseguide-app
        run: |
          npm init -y
          npm install @capacitor/core @capacitor/cli @capacitor/android

      # 7. Write capacitor.config.json
      - name: Write Capacitor config
        working-directory: cseguide-app
        run: |
          cat > capacitor.config.json << 'EOF'
          {
            "appId": "com.hsiskll.cseguide",
            "appName": "CSEGuide",
            "webDir": "www",
            "android": {
              "allowMixedContent": true
            },
            "server": {
              "androidScheme": "https"
            }
          }
          EOF

      # 8. Add Android platform
      - name: Add Android platform
        working-directory: cseguide-app
        run: npx cap add android

      # 9. Sync web files into Android project
      - name: Sync Capacitor
        working-directory: cseguide-app
        run: npx cap sync android

      # 10. Make Gradle executable
      - name: Make gradlew executable
        working-directory: cseguide-app
        run: chmod +x android/gradlew

      # 11. Cache Gradle packages
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('cseguide-app/android/**/*.gradle*', 'cseguide-app/android/**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # 12. Build the debug APK
      - name: Build Debug APK
        working-directory: cseguide-app/android
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      # 13. Upload APK as downloadable artifact
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: CSEGuide-APK
          path: cseguide-app/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Done
        run: |
          echo "✅ APK ready to download!"
          ls -lh cseguide-app/android/app/build/outputs/apk/debug/
